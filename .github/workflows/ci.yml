name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dépot
        uses: actions/checkout@v4

      - name: Créer fichier .env (TODO - utilisez les secrets)
        run: |
          echo "DB_HOST=secrets.DB_HOST" >> .env
          echo "DB_PORT=secrets.DB_PORT" >> .env
          echo "DB_NAME=secrets.DB_NAME" >> .env
          echo "DB_USER=secrets.DB_USER" >> .env
          echo "DB_PASSWORD=secrets.DB_PASSWORD" >> .env
          echo "REDIS_HOST=secrets.REDIS_HOST" >> .env
          echo "REDIS_PORT=secrets.REDIS_PORT" >> .env
          echo "REDIS_DB=secrets.REDIS_DB" >> .env

      - name: Démarrer le conteneur
        run: |
          docker network create labo02-network
          docker compose up -d

      - name: Attendre MySQL
        run: |
          sleep 10
          timeout=60
          until docker compose exec -T mysql mysqladmin ping -h localhost -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
          done
          sleep 5

      - name: Éxécuter les tests
        run: docker compose exec -T store_manager pytest

      - name: Cleanup
        if: always()
        run: docker compose down -v